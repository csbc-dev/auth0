<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@wcstack/state — @csbc-dev/auth0 (remote mode)</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
      section { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
      button, auth0-logout { font: inherit; padding: 0.4rem 0.8rem; }
      auth0-logout { display: inline-block; cursor: pointer; border: 1px solid #888; border-radius: 3px; }
      .row > * + * { margin-left: 0.5rem; }
      .muted { color: #666; }
      .err { color: #b00; }
    </style>

    <!--
      Define the payload custom element (<app-core-facade>). The session adopts
      the first wc-bindable child via `child.constructor.wcBindable`, which is
      module-instance agnostic — no need to share the bootstrap call with
      @csbc-dev/auth0/auto.

      The definition is DELIVERED BY THE EXAMPLE SERVER over its `/_shared/`
      static mount (../shared served as static files). So the schema flows from
      the SINGLE source of truth — `appCoreDeclaration` in ../shared/appCore.js,
      the same declaration the server-side `AppCore` carries — via
      appCoreFacade.auto.js → appCoreFacade.js → appCore.js. There is no
      hand-written duplicate in this page to keep in sync. (appCore.js has no
      bare imports, so this needs no import map.)

      Loaded cross-origin (this page is served separately from the server, e.g.
      at :5176): the server's CORS header makes the module-script load work.
      Timing is safe even though it loads async — <auth0-session> awaits
      `customElements.whenDefined("app-core-facade")` before adopting the child,
      so load order vs. the auto bundles does not matter.

      URL note: this points at the SAME example server as CONFIG_URL below
      (http://localhost:3000). Adjust both if your server is not there.
    -->
    <script type="module" src="http://localhost:3000/_shared/appCoreFacade.auto.js"></script>

    <script type="module" src="https://esm.run/@csbc-dev/auth0/auto"></script>
    <script type="module" src="https://esm.run/@wcstack/state/auto"></script>
  </head>
  <body>
    <h1>@wcstack/state — remote mode</h1>

    <wcs-state>
      <script type="module">
        // Single hardcoded value — the URL of the example server's
        // /auth-config endpoint. Everything else (Auth0 domain /
        // client-id / audience / WebSocket URL) is fetched at boot
        // and pushed into <auth0-gate> via wcstack/state's attribute
        // bindings (`attr.<name>: <stateProp>`).
        //
        // <auth0-gate> waits for `domain` + `client-id` before calling
        // initialize(): until they arrive the element sits inert with
        // `loading` true, which the `...: auth` spread mirrors onto
        // `auth.loading`, keeping the `statusMessage` line on "Loading Auth0…".
        //
        // See ../../docs/patterns/server-config-discovery.md for the
        // full pattern + threat model.
        const CONFIG_URL = "http://localhost:3000/auth-config";

        // Normalize an unknown error-ish value to a display string. Auth0 SDK
        // failures are Error instances (use `.message`); WebSocket / proxy
        // failures may be plain `{ error: "..." }` shapes (use `.error`);
        // anything else falls back to String(). Shared by the authErrorMessage
        // and sessionErrorMessage getters so the two render symmetrically.
        function formatErr(e) {
          if (!e) return "";
          if (typeof e.message === "string") return e.message;
          if (typeof e.error === "string") return e.error;
          return String(e);
        }

        export default {
          // Auth0 config — populated by $connectedCallback below, then
          // mirrored onto <auth0-gate> via attr.* bindings. Empty
          // strings are intentional: <auth0-gate>'s mode inference
          // treats `remote-url=""` as unset (does not flip into remote
          // mode prematurely while config is loading).
          auth0Domain:   "",
          auth0ClientId: "",
          auth0Audience: "",
          remoteUrl:     "",
          redirectUri:   window.location.origin,

          // <auth0-gate> output bindings — nested under `auth` so the five
          // outputs bind as a tidy group (`authenticated: auth.authenticated; …`,
          // see the element below) and so this `error` stays distinct from the
          // session's same-named `error` (a flat layout of both would collide).
          // Leaf names match the gate's `wcBindable.properties` EXACTLY
          // (authenticated / user / loading / error / connected).
          //
          // NOTE: these are bound EXPLICITLY, not via `...: auth`. As of the
          // inputs/commands release the gate also declares `inputs`, and
          // wcstack/state's spread expands `properties` PLUS `inputs` — so a
          // blanket `...: auth` would no longer mean "just the outputs". See the
          // long comment on the element below for the full reasoning.
          auth: {
            authenticated: false,
            user:          null,
            loading:       true,
            error:         null,
            connected:     false,
          },

          // (Login is driven through the gate's `login` command, not a `trigger`
          // boolean — see `$commandTokens` and the `login()` method below. So
          // there is no `shouldLogin` flag here anymore.)

          // <auth0-session> output bindings — same idea: `...: session` spreads
          // ready / connecting / error. Its `error` is separate from auth.error.
          session: {
            ready:      false,
            connecting: false,
            error:      null,
          },

          // <app-core-facade> output bindings — held as a nested object so the
          // facade's data surface can be wired with a single spread
          // (`...: live`, see below) instead of one line per property. The
          // shape mirrors the facade's `wcBindable.properties` names exactly
          // (`count` / `connectedUser`), which is what makes the spread expand
          // to `count: live.count; connectedUser: live.connectedUser`.
          live: { count: 0, connectedUser: "" },

          // Command tokens. `increment` / `decrement` / `reset` route to
          // <app-core-facade> (the server-side Core): <auth0-session> installs
          // them as own-property forwarders that call `proxy.invoke(...)`, and
          // the `command.<name>: <token>` bindings below subscribe each forwarder
          // to its token. `login` routes to <auth0-gate>'s OWN `login` command
          // (declared in its `static wcBindable.commands` as of the
          // inputs/commands release) — the same pub/sub mechanism, just a local
          // element method instead of a remote proxy call.
          //
          // The count tokens are emitted STRAIGHT from the +1 / −1 / Reset
          // buttons (`onclick: $command.<name>` — no state method in between).
          // `login` is the deliberate EXCEPTION: it is emitted from the `login()`
          // method below, not `onclick: $command.login` directly. Why — an
          // `onclick` emit passes the DOM Event as the token payload, and a
          // command subscriber forwards that payload to `el.login(event)`; but
          // the gate's native `login(options)` feeds its first arg straight into
          // Auth0 as `authorizationParams`, so a MouseEvent would land there. The
          // facade's count commands dodge this only because their session-
          // installed forwarders ignore args — the gate's real method does not.
          // Emitting from `login()` with NO payload keeps `el.login()` clean.
          //
          // Declaring every token here is required either way: `$command.<name>`
          // resolves against this list, for both the emit side and the subscribe
          // side.
          $commandTokens: ["login", "increment", "decrement", "reset"],

          // wcstack/state lifecycle hook — fires once after the
          // <wcs-state> element is connected and the state has been
          // wired to the DOM. We do the config fetch here and push
          // values into state; the attr.* bindings propagate to
          // <auth0-gate> automatically.
          async $connectedCallback() {
            // Route EVERY failure mode to the same `auth.error` path: a non-OK
            // HTTP status, a fetch rejection (server not started / DNS / CORS
            // / network drop), AND a res.json() parse failure. The `!res.ok`
            // check alone left the latter two as unhandled promise rejections,
            // which leaves the page stuck on "Loading Auth0…" forever:
            // <auth0-gate> never receives domain/client-id, so it never flips
            // `loading` to false on its own — we have to do it here.
            try {
              const res = await fetch(CONFIG_URL);
              if (!res.ok) throw new Error(`config fetch failed: HTTP ${res.status}`);
              const cfg = await res.json();
              this.auth0Domain   = cfg.domain;
              this.auth0ClientId = cfg.clientId;
              this.auth0Audience = cfg.audience;
              this.remoteUrl     = cfg.remoteUrl;
            } catch (err) {
              // Path-STRING assignment, not `this.auth.error = …`. wcstack/state
              // detects updates only through a path assignment; reading
              // `this.auth` then mutating `.error` on the plain object bypasses
              // the contract and would NOT re-render. Same for `auth.loading`.
              this["auth.error"]   = err instanceof Error ? err : new Error(String(err));
              this["auth.loading"] = false;
            }
          },

          // Single status line — exclusive ladder mirroring the React example.
          // A getter, not four independent `if:` templates, because data-wcs
          // `if:` has no `&&` / `||` operators: four separate conditions can't
          // be made mutually exclusive in the template (at boot `auth.loading`
          // AND `auth.authenticated|not` are both true; the authenticated-but-
          // not-yet-connected gap matches none). The getter reads several
          // reactive props and wcstack/state's dependency tracking re-renders
          // {{ statusMessage }} whenever any of them changes.
          //
          // Nested props are read via dot-path STRINGS (`this["auth.loading"]`),
          // the same form path getters use internally — that is what registers
          // the per-path dependency. `this.auth.loading` would read the plain
          // sub-object and miss fine-grained tracking.
          get statusMessage() {
            if (this["auth.loading"])       return "Loading Auth0…";
            if (!this["auth.authenticated"]) return "Signed out.";
            if (this["session.ready"])      return "Session ready.";
            if (this["session.connecting"]) return "Opening session…";
            return "Authenticated, waiting for session…";
          },

          get authErrorMessage()    { return formatErr(this["auth.error"]); },
          get sessionErrorMessage() { return formatErr(this["session.error"]); },

          // Fire the gate's `login` command through wcstack/state's $command
          // pub/sub — symmetric with how the +1 / −1 / Reset buttons reach the
          // facade's commands. `command.login: $command.login` on <auth0-gate>
          // (below) subscribes the element's native `login()` to this token, so
          // emitting it calls `el.login()`.
          //
          // Emit with NO argument on purpose (see the $commandTokens note): a
          // command subscriber forwards the emit payload to `el.login(payload)`,
          // and the gate feeds login()'s first arg into Auth0 as
          // `authorizationParams` — so a no-arg emit is what keeps the redirect
          // login options clean.
          //
          // `emit()` returns the subscribers' results — here the gate's
          // `login()` promise. `login()` rejects on one precondition path
          // (clicking Sign in before init, while the Auth0 client isn't ready —
          // the button is visible during the loading phase), so `allSettled`
          // swallows that rejection instead of leaking an unhandled one. Auth0
          // SDK failures do NOT reject (they surface via `auth.error`); this
          // guard is only for the precondition. `allSettled` never rejects, so
          // the floating promise is safe.
          login() {
            Promise.allSettled(this.$command.login.emit());
          },

          // NOTE: the +1 / −1 / Reset buttons need no handler methods here.
          // Their clicks emit to the command tokens DIRECTLY from the markup
          // via `onclick: $command.<name>` (wcstack/state's event→command
          // binding), so there is no `incrementClick`-style trampoline to keep
          // in sync. See the button section at the bottom of the page. (`login`
          // is the one deliberate exception — it routes through the `login()`
          // method above so the click Event is NOT forwarded into the gate's
          // command; see the $commandTokens note for why.)
        };
      </script>

      <!--
        EVERYTHING EXPLICIT — no `...:` spread on the gate. As of the
        inputs/commands release, `<auth0-gate>`'s `wcBindable` declares three
        surfaces, not one:

          - OUTPUT `properties`: authenticated / user / loading / error /
            connected (+ `trigger`, which is also an input)
          - `inputs`: domain / client-id / audience / scope / redirect-uri /
            cache-location / use-refresh-tokens / remote-url / mode / trigger —
            most mapped to a kebab-case DOM attribute
          - `commands`: login / logout / getToken / connect / refreshToken /
            reconnect

        wcstack/state's `...:` spread expands `properties` PLUS `inputs`, so
        `...: auth` would NO LONGER mean "the five outputs": it would also emit a
        state→element write for every declared input. The configured inputs would
        fight the explicit `attr.*` writes below — the spread reads `auth.domain`
        (which doesn't exist), and wcstack/state's null-guard turns that into
        `removeAttribute("domain")`, clobbering the value `attr.domain` just set —
        and the unconfigured inputs (`trigger` — which is also a property — plus
        `scope` / `mode` / …) would be driven from absent state paths too. So the
        five state outputs are listed by hand
        (exactly what `...: auth` used to expand to) and config stays the
        deliberate, one-directional `attr.*` writes it was designed to be.

        Login is driven through the gate's OWN `login` command —
        `command.login: $command.login` below, fired from the `login()` method
        via `$command.login.emit()`, symmetric with how the payload facade's
        increment / decrement / reset commands are wired. (Logout still goes
        through `<auth0-logout>`. The gate's other commands — getToken / connect /
        refreshToken / reconnect — are not needed by this page.)

        The payload facade further down still uses `...: live`, because it
        declares NO `inputs` — there the spread is still properties-only.
      -->
      <auth0-gate
        id="auth"
        data-wcs="
          attr.domain:       auth0Domain;
          attr.client-id:    auth0ClientId;
          attr.audience:     auth0Audience;
          attr.remote-url:   remoteUrl;
          attr.redirect-uri: redirectUri;
          command.login:     $command.login;
          authenticated:     auth.authenticated;
          user:              auth.user;
          loading:           auth.loading;
          error:             auth.error;
          connected:         auth.connected
        ">
      </auth0-gate>

      <!--
        OUTPUTS spread the same way. The session's `wcBindable` declares three
        output properties (ready / connecting / error) and no inputs, so
        `...: session` expands them into the `session` object. `target` is a
        plain HTML attribute (it points at the gate's id), not a data-wcs
        binding, so it stays on the element itself.
      -->
      <auth0-session
        id="session"
        target="auth"
        data-wcs="...: session">
        <!--
          Payload child — <auth0-session> mirrors the server-side Core's
          `count` / `connectedUser` onto this element, dispatches the
          declared events on it, and installs `increment` / `decrement` /
          `reset` as command forwarders. data-wcs reads directly from
          this element, no extra bridging code in the state.

          DATA SURFACE via SPREAD — `...: live` expands to one binding per
          `wcBindable.properties` name (`count: live.count;
          connectedUser: live.connectedUser`). The spread covers `properties`
          PLUS `inputs`, but this facade declares NO `inputs`, so here it stays
          properties-only — which is exactly why the spread is still appropriate
          on the facade even though it was retired on `<auth0-gate>` above (whose
          new `inputs` would over-expand it). wcstack/state reads the facade's
          `static wcBindable` to know what to expand, so the page never restates
          the property list; the nested `live` state object just has to use the
          same names. The facade loads cross-origin and async, but spread is
          safe here: for a not-yet-registered custom element class wcstack/state
          DEFERS the expansion until `customElements.whenDefined("app-core-facade")`
          resolves, matching this page's load-order-agnostic design.

          COMMANDS stay EXPLICIT — spread deliberately covers only the data
          surface (properties + inputs), never `commands`, so the pub/sub
          firing points remain readable in the HTML. Each `command.<name>:
          <token>` line subscribes a forwarder to a wcstack/state command token;
          when the token emits (from a button's `onclick: $command.<name>` or
          from state code), wcstack/state invokes the facade's forwarder, which
          routes to `proxy.invoke()`. `command.<name>` is validated against
          `static wcBindable.commands` on the facade at binding time.
        -->
        <app-core-facade
          data-wcs="
            ...: live;
            command.increment: $command.increment;
            command.decrement: $command.decrement;
            command.reset:     $command.reset
          ">
        </app-core-facade>
      </auth0-session>

      <section>
        <!--
          Single status line. data-wcs `if:` has no boolean operators
          (`&&` / `||`), so four independent `if:` templates can't be made
          mutually exclusive: at boot `auth.loading` AND `auth.authenticated|not`
          are both true (two lines at once) and the authenticated-but-not-yet-
          connected gap matches none (blank line). The exclusive ladder lives
          in the `statusMessage` getter above; {{ }} re-renders reactively.
        -->
        <p class="muted">{{ statusMessage }}</p>

        <template data-wcs="if: auth.error">
          <p class="err">Auth error: {{ authErrorMessage }}</p>
        </template>
        <template data-wcs="if: session.error">
          <p class="err">Session error: {{ sessionErrorMessage }}</p>
        </template>

        <template data-wcs="if: auth.authenticated|not">
          <button data-wcs="onclick: login">Sign in</button>
        </template>
        <template data-wcs="if: auth.authenticated">
          <!--
            <auth0-logout> is a bare HTMLElement that only wires a `click`
            listener (no native button semantics). Add `role="button"` so
            assistive tech announces it as a button and `tabindex="0"` so it
            is keyboard-focusable — the other examples use a real <button>,
            which gets both for free. NOTE: focus + announce only; the
            element does not translate Enter/Space into a click, so full
            keyboard activation would need a real <button> or a keydown
            handler. For an a11y-critical app prefer a <button> that calls
            the gate's logout() directly.
          -->
          <auth0-logout target="auth" role="button" tabindex="0">Sign out</auth0-logout>
        </template>
      </section>

      <template data-wcs="if: session.ready">
        <section>
          <p>Count: <strong>{{ live.count }}</strong></p>
          <p class="muted">Connected as: {{ live.connectedUser }}</p>
          <!--
            EVENT → COMMAND, no trampoline. The right-hand side of each
            `onclick:` is a `$command.<name>` path, not a state method, so the
            click emits to the token DIRECTLY: wcstack/state runs
            `state.$command.increment.emit(event)`. The facade's matching
            `command.increment: $command.increment` subscriber receives it and
            calls `proxy.invoke(...)` over the WebSocket. The DOM `Event` is the
            emit's first argument (subscribers ignore it here). No
            `incrementClick` method, no element lookup — state and element are
            decoupled by the token name.
          -->
          <div class="row">
            <button data-wcs="onclick: $command.increment">+1</button>
            <button data-wcs="onclick: $command.decrement">−1</button>
            <button data-wcs="onclick: $command.reset">Reset</button>
          </div>
        </section>
      </template>
    </wcs-state>
  </body>
</html>
