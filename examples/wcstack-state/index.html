<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@wcstack/state — @csbc-dev/auth0 (remote mode)</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
      section { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
      button, auth0-logout { font: inherit; padding: 0.4rem 0.8rem; }
      auth0-logout { display: inline-block; cursor: pointer; border: 1px solid #888; border-radius: 3px; }
      .row > * + * { margin-left: 0.5rem; }
      .muted { color: #666; }
      .err { color: #b00; }
    </style>

    <!--
      Define the payload custom element. The session adopts the first
      wc-bindable child via `child.constructor.wcBindable`, which is
      module-instance agnostic — no need to share the bootstrap call
      with @csbc-dev/auth0/auto.
    -->
    <script type="module">
      class AppCoreFacade extends HTMLElement {
        static wcBindable = {
          protocol: "wc-bindable",
          version: 1,
          properties: [
            { name: "count",         event: "app-core:count-changed" },
            { name: "lastUpdatedBy", event: "app-core:last-updated-by-changed" },
          ],
          commands: [
            { name: "increment" },
            { name: "decrement" },
            { name: "reset" },
          ],
        };
      }
      customElements.define("app-core-facade", AppCoreFacade);
    </script>

    <script type="module" src="https://esm.run/@csbc-dev/auth0/auto"></script>
    <script type="module" src="https://esm.run/@wcstack/state/auto"></script>
  </head>
  <body>
    <h1>@wcstack/state — remote mode</h1>

    <wcs-state>
      <script type="module">
        // Single hardcoded value — the URL of the example server's
        // /auth-config endpoint. Everything else (Auth0 domain /
        // client-id / audience / WebSocket URL) is fetched at boot
        // and pushed into <auth0-gate> via wcstack/state's attribute
        // bindings (`attr.<name>: <stateProp>`).
        //
        // <auth0-gate> waits for `domain` + `client-id` before calling
        // initialize(): until they arrive the element sits inert and
        // the data-wcs `loading: authLoading` binding shows the
        // "Loading Auth0…" template.
        //
        // See ../../docs/patterns/server-config-discovery.md for the
        // full pattern + threat model.
        const CONFIG_URL = "http://localhost:3000/auth-config";

        export default {
          // Auth0 config — populated by $connectedCallback below, then
          // mirrored onto <auth0-gate> via attr.* bindings. Empty
          // strings are intentional: <auth0-gate>'s mode inference
          // treats `remote-url=""` as unset (does not flip into remote
          // mode prematurely while config is loading).
          auth0Domain:   "",
          auth0ClientId: "",
          auth0Audience: "",
          remoteUrl:     "",
          redirectUri:   window.location.origin,

          // <auth0-gate> output bindings.
          isLoggedIn: false,
          currentUser: null,
          authLoading: true,
          authError: null,
          wsConnected: false,
          shouldLogin: false,

          // <auth0-session> output bindings.
          sessionReady: false,
          sessionConnecting: false,
          sessionError: null,

          // <app-core-facade> output bindings.
          liveCount: 0,
          liveAuthor: "",

          // Command tokens delivered to <app-core-facade> by wcstack/state.
          // The facade element exposes increment / decrement / reset in its
          // `static wcBindable.commands`, and <auth0-session> installs them
          // as own-property forwarders that call `proxy.invoke(...)`. The
          // `command.<name>: <token>` bindings below subscribe each forwarder
          // to its token, so emitting the token fires the proxy command.
          $commandTokens: ["increment", "decrement", "reset"],

          // wcstack/state lifecycle hook — fires once after the
          // <wcs-state> element is connected and the state has been
          // wired to the DOM. We do the config fetch here and push
          // values into state; the attr.* bindings propagate to
          // <auth0-gate> automatically.
          async $connectedCallback() {
            const res = await fetch(CONFIG_URL);
            if (!res.ok) {
              this.authError = new Error(`config fetch failed: HTTP ${res.status}`);
              this.authLoading = false;
              return;
            }
            const cfg = await res.json();
            this.auth0Domain   = cfg.domain;
            this.auth0ClientId = cfg.clientId;
            this.auth0Audience = cfg.audience;
            this.remoteUrl     = cfg.remoteUrl;
          },

          get authErrorMessage() {
            const e = this.authError;
            if (!e) return "";
            if (typeof e.message === "string") return e.message;
            if (typeof e.error === "string") return e.error;
            return String(e);
          },

          login() { this.shouldLogin = true; },

          // Button click handlers — each emits to a command token. The
          // matching `command.<name>:` binding on <app-core-facade> routes
          // the emit to the proxy forwarder, which in turn calls
          // `proxy.invoke(...)` over the WebSocket. No `document.querySelector`
          // / element lookup needed: state and element are decoupled by the
          // token, so reordering or duplicating the facade does not break
          // these handlers.
          incrementClick() { this.$command.increment.emit(); },
          decrementClick() { this.$command.decrement.emit(); },
          resetClick()     { this.$command.reset.emit(); },
        };
      </script>

      <auth0-gate
        id="auth"
        data-wcs="
          attr.domain:       auth0Domain;
          attr.client-id:    auth0ClientId;
          attr.audience:     auth0Audience;
          attr.remote-url:   remoteUrl;
          attr.redirect-uri: redirectUri;
          authenticated:     isLoggedIn;
          user:              currentUser;
          loading:           authLoading;
          error:             authError;
          connected:         wsConnected;
          trigger:           shouldLogin
        ">
      </auth0-gate>

      <auth0-session
        id="session"
        target="auth"
        data-wcs="
          ready:      sessionReady;
          connecting: sessionConnecting;
          error:      sessionError
        ">
        <!--
          Payload child — <auth0-session> mirrors the server-side Core's
          `count` / `lastUpdatedBy` onto this element, dispatches the
          declared events on it, and installs `increment` / `decrement` /
          `reset` as command forwarders. data-wcs reads directly from
          this element, no extra bridging code in the state.

          The `command.<name>: <token>` lines subscribe each forwarder to
          a wcstack/state command token. When state calls
          `this.$command.increment.emit()`, wcstack/state invokes the
          facade's `increment` forwarder, which routes to `proxy.invoke()`.
          `command.<name>` is validated against `static wcBindable.commands`
          on the facade at binding time.
        -->
        <app-core-facade
          data-wcs="
            count:             liveCount;
            lastUpdatedBy:     liveAuthor;
            command.increment: $command.increment;
            command.decrement: $command.decrement;
            command.reset:     $command.reset
          ">
        </app-core-facade>
      </auth0-session>

      <section>
        <template data-wcs="if: authLoading">
          <p class="muted">Loading Auth0…</p>
        </template>
        <template data-wcs="if: isLoggedIn|not">
          <p class="muted">Signed out.</p>
        </template>
        <template data-wcs="if: sessionConnecting">
          <p class="muted">Opening session…</p>
        </template>
        <template data-wcs="if: sessionReady">
          <p class="muted">Session ready.</p>
        </template>

        <template data-wcs="if: authError">
          <p class="err">Auth error: {{ authErrorMessage }}</p>
        </template>
        <template data-wcs="if: sessionError">
          <p class="err">Session error: {{ sessionError.message }}</p>
        </template>

        <template data-wcs="if: isLoggedIn|not">
          <button data-wcs="onclick: login">Sign in</button>
        </template>
        <template data-wcs="if: isLoggedIn">
          <auth0-logout target="auth">Sign out</auth0-logout>
        </template>
      </section>

      <template data-wcs="if: sessionReady">
        <section>
          <p>Count: <strong>{{ liveCount }}</strong></p>
          <p class="muted">Last updated by: {{ liveAuthor }}</p>
          <div class="row">
            <button data-wcs="onclick: incrementClick">+1</button>
            <button data-wcs="onclick: decrementClick">−1</button>
            <button data-wcs="onclick: resetClick">Reset</button>
          </div>
        </section>
      </template>
    </wcs-state>
  </body>
</html>
